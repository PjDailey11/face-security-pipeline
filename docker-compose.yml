services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      TORCH_DEVICE: cpu
      YOLO_WEIGHTS: /app/weights/yolov8_face.pt
      ANTISPOOF_WEIGHTS: /app/weights/antispoof.pt
      CHROMA_DIR: /app/data/chroma_faces
      REDACT_UNKNOWN: "true"
      SKIP_MODEL_INIT: "false"
      # ATTENDANCE_DATABASE_URL: postgresql+psycopg2://face:face@db:5432/faces
    volumes:
      - ./data:/app/data
      - ./weights:/app/weights

